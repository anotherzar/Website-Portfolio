<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hubungi Saya - Zar's Portfolio</title>
    <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;🎬&lt;/text&gt;&lt;/svg&gt;">
    <link rel="prefetch" href="index.html">
    <link rel="prefetch" href="about.html">
    <link rel="prefetch" href="portfolio.html">

    <link rel="stylesheet" href="src/style/global.css">
    <link rel="stylesheet" href="src/style/contact.css">
    <link rel="stylesheet" href="src/style/pattern-margin.css">
    <link rel="stylesheet" href="src/style/translate.css">
</head>

<body>
    <div class="pattern-area"></div>

    <header>
        <nav class="nav">
            <a href="index.html" data-t="nav_home">Home</a>
            <a href="about.html" data-t="nav_about">About</a>
            <a href="portfolio.html" data-t="nav_portfolio">Portofolio</a>
            <a href="contact.html" data-t="nav_contact">Contact</a>
        </nav>
    </header>

    <main>
        <div class="contact-hero">
            <h1 class="contact-title" data-t="contact_title">Let's Connect</h1>
            <p class="contact-subtitle" data-t="contact_sub">Punya ide menarik atau sekadar ingin menyapa? Jangan ragu untuk menghubungi!</p>
        </div>

        <div class="contact-container">
            <form id="contactForm" class="contact-form">
                <input type="hidden" name="botcheck" style="display: none;">
                <div class="form-row">
                    <div class="form-group">
                        <label for="nama" data-t="form_name">Nama</label>
                        <input type="text" id="nama" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="email" data-t="form_email">Email</label>
                        <input type="email" id="email" placeholder="hello@example.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="subjek" data-t="form_subject">Subjek</label>
                    <input type="text" id="subjek" placeholder="Project Collaboration" required>
                </div>

                <div class="form-group">
                    <label for="pesan" data-t="form_message">Pesan</label>
                    <textarea id="pesan" rows="6" placeholder="Tell me about your project..." required></textarea>
                </div>

                <button type="button" class="contact-submit" onclick="kirimPesan()" data-t="form_send">Kirim</button>
                <p id="status" class="form-status"></p>
            </form>
        </div>
    </main>

    <footer>
        <p>made with &hearts; by &copy; 2025 zarvx_</p>
    </footer>

    <script src="src/js/data/translations.js"></script>
    <script src="src/js/components/LanguageSwitch.js"></script>
    <script src="src/js/index.js"></script>
</body>

</html>
