<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portofolio - Zar's Portfolio</title>
    <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;🎬&lt;/text&gt;&lt;/svg&gt;">
    
    <link rel="preconnect" href="https://www.youtube.com">
    <link rel="preconnect" href="https://i.ytimg.com">

    <link rel="prefetch" href="index.html">
    <link rel="prefetch" href="about.html">
    <link rel="prefetch" href="contact.html">

    <link rel="stylesheet" href="src/style/global.css">
    <link rel="stylesheet" href="src/style/pattern-margin.css">
    <link rel="stylesheet" href="src/style/portfolio-dynamic.css">
    <link rel="stylesheet" href="src/style/translate.css">
</head>

<body>
    <div class="pattern-area"></div>

    <header>
        <nav class="nav">
            <a href="index.html" data-t="nav_home">Home</a>
            <a href="about.html" data-t="nav_about">About</a>
            <a href="portfolio.html" data-t="nav_portfolio">Portofolio</a>
            <a href="contact.html" data-t="nav_contact">Contact</a>
        </nav>
    </header>

    <main>
        <button id="backToTop" class="back-to-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})" aria-label="Back to Top" data-t-aria-label="back_to_top">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 15l-6-6-6 6"/>
            </svg>
        </button>
        <div class="content-wrapper">
            <!-- HUB PLAYLISTS -->
            <section id="playlist-hub" class="content">
                <h2 style="text-align:left; margin-top: clamp(0px, (768px - 100vw) * 100, 60px); font-size: clamp(2rem, 5vw, 5rem); margin-bottom: 1rem;">Portfolio Playlists</h2>
                <p style="text-align:left; font-size: clamp(1rem, 2vw, 1rem); opacity: 0.7; font-weight: 500;" data-t="portfolio_sub">Playlist ini berisi kumpulan karya-karya yang telah saya buat</p>
                <div class="playlist-grid" id="category-grid">
                    <!-- ambil data dari portfolio-data.json -->
                </div>
            </section>

            <!-- PLAYLIST VIEW -->
            <section id="playlist-view" class="content" style="display: none;">
                <div class="playlist-header">
                    <button class="back-btn" onclick="closePlaylist()" data-t="back_to_categories">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
                        Kembali ke Kategori
                    </button>
                    <div class="playlist-intro">
                        <img id="playlist-cover" src="" alt="Cover" class="playlist-cover-img">
                        <div class="playlist-info">
                            <span style="font-size: 0.9rem; font-weight: 500;" data-t="playlist_label">Playlist</span>
                            <h2 id="playlist-title" style="font-size: clamp(2rem, 5vw, 4rem); font-weight: 900; margin: 0.5rem 0; line-height: 1.2;">Title</h2>
                            <p id="playlist-desc" style="margin: 0; max-width: 600px; color: #b3b3b3;">Desc</p>
                            <div class="playlist-stats" style="margin-top: 1rem; font-size: 0.9rem; color: #fff; font-weight: 500; display: flex; align-items: center; gap: 4px;">
                                <span id="playlist-count-label">0 karya</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- DYNAMIC GRID DATABASES -->
                <div class="grid" id="dynamic-grid">
                    <!-- ambil data dari portfolio-data.json -->
                </div>

            </section>
        </div>
    </main>

    <footer>
        <p>made with &hearts; by &copy; 2025 zarvx_</p>
    </footer>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>
    <script src="src/js/data/translations.js"></script>
    <script src="src/js/components/LanguageSwitch.js"></script>
    <script src="src/js/anim.js"></script>
    <script src="src/js/portfolio-logic.js"></script>
</body>

</html>
